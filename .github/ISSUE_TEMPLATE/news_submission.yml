name: 뉴스 제보 등록 / News submission
description: 배너 뉴스 티커에 새 소식을 추가하려면 이 양식을 사용하세요. Use this form to submit a news item.
title: "[News] "
labels: ["news-submission"]
body:
  - type: markdown
    attributes:
      value: |
        이 양식이 제출되면 자동화 봇이 `docs/news.json`에 항목을 추가하는 PR을 생성합니다.
        Once submitted, an automation bot will open a PR adding your entry to `docs/news.json`.

  - type: input
    id: start
    attributes:
      label: 시작 일시 / Start datetime
      description: "형식 / Format: YYYY-MM-DD HH:MM:SS"
      placeholder: "2026-06-01 00:00:00"
    validations:
      required: true

  - type: input
    id: end
    attributes:
      label: 종료 일시 / End datetime
      description: "형식 / Format: YYYY-MM-DD HH:MM:SS"
      placeholder: "2026-06-30 23:59:59"
    validations:
      required: true

  - type: input
    id: timezone
    attributes:
      label: 타임존 / Timezone
      description: UTC 오프셋(예 +09:00) 또는 IANA 이름(예 Asia/Seoul). 비워두면 UTC. / UTC offset (e.g. +09:00) or IANA name (e.g. Asia/Seoul). Blank means UTC.
      placeholder: "+09:00"
      value: "+09:00"
    validations:
      required: false

  - type: input
    id: message_ko
    attributes:
      label: 뉴스 메시지 (한국어) / Message (Korean)
    validations:
      required: true

  - type: input
    id: message_en
    attributes:
      label: 뉴스 메시지 (영어) / Message (English)
      description: 비워두면 리포지터리 컨트리뷰터가 PR 단계에서 재량껏 번역해 채울 수 있습니다. / If left blank, a repository contributor may translate it at the PR stage.
    validations:
      required: false

  - type: input
    id: link_ko
    attributes:
      label: 링크 (한국어) / Link (Korean)
      description: 선택 사항. https:// 로 시작해야 합니다. / Optional. Must start with https://.
      placeholder: https://example.com/
    validations:
      required: false

  - type: input
    id: link_en
    attributes:
      label: 링크 (영어) / Link (English)
      description: 비워두면 한국어 링크를 그대로 사용합니다. / Leave blank to reuse the Korean link.
      placeholder: https://example.com/en
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: 카테고리 / Category
      description: |
        선택 사항. 'event'로 지정하면 캘린더(.ics)와 Schema.org Event 데이터에서 더 정확하게 다뤄집니다.
        Optional. Setting this to 'event' helps calendar (.ics) and Schema.org Event consumers treat the item more accurately.
      options:
        - ""
        - "event"
        - "campaign"
        - "release"
        - "recruit"
        - "announcement"
      default: 0
    validations:
      required: false

  - type: input
    id: event_start
    attributes:
      label: 실제 이벤트 시작 일시 / Actual event start
      description: |
        선택 사항. 위 '시작 일시'는 배너 표시 시작을 의미합니다. 이벤트의 실제 시작 시각이 다르면 여기에 입력하세요 (캘린더에 반영됩니다).
        Optional. The 'Start datetime' field above is when the banner begins displaying. If the actual event start differs, enter it here (used by the calendar feed).
      placeholder: "2026-06-15 14:00:00"
    validations:
      required: false

  - type: input
    id: event_end
    attributes:
      label: 실제 이벤트 종료 일시 / Actual event end
      description: |
        선택 사항. 비워두면 'event_start'와 같은 시각으로 처리됩니다.
        Optional. If blank, defaults to the same time as 'event_start'.
      placeholder: "2026-06-15 17:00:00"
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: 장소 / Location
      description: |
        선택 사항. 사람이 읽을 수 있는 장소 이름을 입력하세요 (예: '서울 강남'). 캘린더의 LOCATION 필드와 Schema.org Event.location.name 에 사용됩니다.
        Optional. Free-form venue name (e.g. 'Seoul Gangnam'). Used as the calendar LOCATION and Schema.org Event.location.name.
      placeholder: "서울 강남"
    validations:
      required: false

  - type: dropdown
    id: display
    attributes:
      label: 표시 여부 / Display
      options:
        - "true"
        - "false"
      default: 0
    validations:
      required: true
