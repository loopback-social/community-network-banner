name: 커뮤니티 등록 요청 / Community submission
description: Loopback Social 배너에 커뮤니티를 추가하려면 이 양식을 사용하세요. Use this form to add a community to the banner.
title: "[Community] "
labels: ["community-submission"]
body:
  - type: markdown
    attributes:
      value: |
        이 양식이 제출되면 자동화 봇이 `docs/communities.json`에 항목을 추가하는 PR을 생성합니다.
        Once submitted, an automation bot will open a PR adding your entry to `docs/communities.json`.

  - type: input
    id: name_ko
    attributes:
      label: 커뮤니티 이름 (한국어) / Name (Korean)
      placeholder: 예) 닷넷데브
    validations:
      required: true

  - type: input
    id: name_en
    attributes:
      label: 커뮤니티 이름 (영어) / Name (English)
      description: 비워두면 리포지터리 컨트리뷰터가 PR 단계에서 재량껏 번역해 채울 수 있습니다. / If left blank, a repository contributor may translate it at the PR stage.
      placeholder: e.g. .NET Dev
    validations:
      required: false

  - type: input
    id: url_ko
    attributes:
      label: 커뮤니티 URL (한국어) / URL (Korean)
      description: https:// 로 시작하는 전체 URL을 입력하세요. / Provide the full https:// URL.
      placeholder: https://example.com/
    validations:
      required: true

  - type: input
    id: url_en
    attributes:
      label: 커뮤니티 URL (영어) / URL (English)
      description: 비워두면 한국어 URL을 그대로 사용합니다. / Leave blank to reuse the Korean URL.
      placeholder: https://example.com/en
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 네트워크 뉴스 소스 / Network news source (선택 / optional)

        등재 후 매 6시간마다 자동으로 가져갈 뉴스 JSON 파일의 URL입니다. 형식은 우리 `news.schema.json`과 동일합니다. 한 커뮤니티당 최대 2개(언어별)까지 등록 가능하며, 각 URL의 최근 active 항목이 자동으로 배너에 노출됩니다. 비워두면 종전과 같이 매번 이슈/PR로 소식을 제보할 수 있습니다.

        URL of a JSON file we will fetch every 6 hours after registration. The file must follow our `news.schema.json`. You can register up to two URLs per community (one per language); the most recent active items from each are surfaced on the banner. Leave blank to keep posting via issues/PRs as before.

  - type: input
    id: network_url_ko
    attributes:
      label: 네트워크 뉴스 소스 URL (한국어) / Network news source URL (Korean)
      description: https:// 로 시작하는 전체 URL. / Full https:// URL.
      placeholder: https://example.com/loopback.ko.json
    validations:
      required: false

  - type: input
    id: network_url_en
    attributes:
      label: 네트워크 뉴스 소스 URL (영어) / Network news source URL (English)
      description: 영어 콘텐츠가 분리된 별도 URL이 있다면 입력. 비워두면 한국어 URL만 사용. / Separate English-content URL if you publish one. Blank uses the Korean URL only.
      placeholder: https://example.com/loopback.en.json
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 커뮤니티 설명 / Description
      description: 검토용 컨텍스트입니다. 파일에는 저장되지 않습니다. / Context for reviewers; not stored in the JSON.
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: 등록을 원하는 이유 / Why join
      description: 검토용 컨텍스트입니다. 파일에는 저장되지 않습니다. / Context for reviewers; not stored in the JSON.
    validations:
      required: false
